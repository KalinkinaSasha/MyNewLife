<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>My New Life</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>My New Life</h2>
    <p id="hello">Дневник еды, воды и тренировок</p>
  </div>

  <div class="card">
    <h3>🍽 Добавить еду</h3>
    <textarea id="foodText" placeholder="Например: бутер с сыром и 2 конфеты"></textarea>
    <button onclick="sendFood()">Записать еду</button>
  </div>

  <div class="card">
    <h3>💧 Вода</h3>
    <button onclick="sendWater(250)">+250 мл</button>
    <button onclick="sendWater(500)">+500 мл</button>
  </div>

  <div class="card">
    <h3>🏋️ Тренировка</h3>
    <textarea id="workoutText" placeholder="Например: присед 3х12, планка 1 мин"></textarea>
    <button onclick="sendWorkout()">Записать тренировку</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    if (user) {
      document.getElementById("hello").innerText =
        `Привет, ${user.first_name}!`;
    }

    function sendToBot(payload) {
      tg.sendData(JSON.stringify(payload));
    }

    function sendFood() {
      const text = document.getElementById("foodText").value;

      sendToBot({
        type: "food",
        text: text
      });
    }

    function sendWater(amount) {
      sendToBot({
        type: "water",
        water_ml: amount
      });
    }

    function sendWorkout() {
      const text = document.getElementById("workoutText").value;

      sendToBot({
        type: "workout",
        text: text
      });
    }
  </script>
</body>
</html>
